<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاركة الموقع</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:30px;
background:#f5f5f5;
}

button{
padding:15px 30px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}
</style>
</head>
<body>

<h2>📍 مشاركة الموقع</h2>

<button onclick="getLocation()">إرسال موقعي</button>

<div id="result"></div>

<script>

function getLocation(){

if(!navigator.geolocation){
alert("المتصفح لا يدعم GPS");
return;
}

navigator.geolocation.getCurrentPosition(

(position)=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

document.getElementById("result").innerHTML = `
<p>خط العرض: ${lat}</p>
<p>خط الطول: ${lng}</p>

<a target="_blank"
href="https://www.google.com/maps?q=${lat},${lng}">
فتح الموقع على الخريطة
</a>
`;

},

(error)=>{
alert("تم رفض مشاركة الموقع");
}

);

}

</script>

</body>
</html>
