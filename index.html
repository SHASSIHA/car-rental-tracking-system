<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع موقع المستأجر</title>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
padding:30px;
background:#f5f5f5;
}

input,select{
padding:10px;
font-size:16px;
margin:5px;
}

button{
padding:15px 30px;
font-size:18px;
cursor:pointer;
}

#timer{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

#result{
margin-top:20px;
font-size:18px;
}
</style>

</head>
<body>

<h2>📍 تتبع موقع المستأجر</h2>

<input id="customerName" placeholder="اسم الزبون">

<br><br>

<select id="hours">
<option value="1">ساعة</option>
<option value="6">6 ساعات</option>
<option value="12">12 ساعة</option>
<option value="24">24 ساعة</option>
<option value="48">48 ساعة</option>
</select>

<br><br>

<button onclick="startTracking()">بدء التتبع</button>

<div id="timer"></div>
<div id="result"></div>

<script>

let watchId;

function startTracking(){

if(!navigator.geolocation){
alert("المتصفح لا يدعم GPS");
return;
}

const hours = Number(document.getElementById("hours").value);

const endTime = Date.now() + (hours * 60 * 60 * 1000);

updateTimer(endTime);

setInterval(()=>{
updateTimer(endTime);
},1000);

watchId = navigator.geolocation.watchPosition(

(position)=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

fetch(
"https://script.google.com/macros/s/AKfycbwvcvZDRe5lTLvm-ElFzvsZEEHHHgSnxk_KBquwHfr1qfeo4Rm7T6-gSspukZBWd38X/exec",
{
method:"POST",
body:JSON.stringify({
name: document.getElementById("customerName").value || "زبون",
lat: lat,
lng: lng
})
}
);

document.getElementById("result").innerHTML = `
<p>📍 الموقع الحالي</p>

<a target="_blank"
href="https://www.google.com/maps?q=${lat},${lng}">
فتح الموقع على الخريطة
</a>

<p>Latitude: ${lat}</p>
<p>Longitude: ${lng}</p>
`;

},

(error)=>{
alert("تم رفض مشاركة الموقع");
},

{
enableHighAccuracy:true
}

);

}

function updateTimer(endTime){

const remaining = endTime - Date.now();

if(remaining <= 0){

document.getElementById("timer").innerHTML =
"⛔ انتهت مدة التتبع";

navigator.geolocation.clearWatch(watchId);

return;
}

const h = Math.floor(remaining / 3600000);
const m = Math.floor((remaining % 3600000) / 60000);
const s = Math.floor((remaining % 60000) / 1000);

document.getElementById("timer").innerHTML =
`⏳ الوقت المتبقي: ${h}:${m}:${s}`;

}

</script>

</body>
</html>
