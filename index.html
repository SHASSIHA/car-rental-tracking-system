<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاصيها | تتبع المستأجر</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffffff,#f3f4f6);
text-align:center;
}
.logo-wrap{
position:relative;
padding-top:25px;
}
.glow{
width:170px;height:170px;
background:#ff6a00;
opacity:.25;
border-radius:50%;
position:absolute;
left:50%;
top:10px;
transform:translateX(-50%);
filter:blur(45px);
}
.logo{
width:140px;
position:relative;
z-index:2;
}
.subtitle{
font-size:22px;
font-weight:bold;
color:#374151;
margin-top:10px;
}
.card{
background:#1f2937;
color:white;
margin:20px;
padding:25px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}
input,select{
width:90%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:none;
font-size:16px;
}
button{
width:90%;
padding:15px;
background:#ff6a00;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}
#timer{font-size:24px;font-weight:bold;margin-top:15px;color:#ffb067}
.status{margin-top:10px;font-weight:bold}
a.mapbtn{
display:block;
background:#374151;
color:white;
padding:14px;
border-radius:12px;
text-decoration:none;
margin-top:15px;
}
footer{
margin-top:30px;
padding:20px;
color:#6b7280;
}
</style>
</head>
<body>

<div class="logo-wrap">
<div class="glow"></div>
<img src="./logo.png" class="logo">
</div>

<div class="subtitle">شاصيها | تتبع المستأجر</div>

<div class="card">
<input id="customerName" placeholder="اسم الزبون">
<select id="hours">
<option value="1">ساعة</option>
<option value="6">6 ساعات</option>
<option value="12">12 ساعة</option>
<option value="24">24 ساعة</option>
<option value="48">48 ساعة</option>
</select>

<button id="startBtn" onclick="startTracking()">📍 بدء التتبع</button>

<div id="timer"></div>
<div class="status" id="status"></div>
<div id="result"></div>
</div>

<footer>Powered by <b>SHASSIHA</b> © 2026</footer>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwvcvZDRe5lTLvm-ElFzvsZEEHHHgSnxk_KBquwHfr1qfeo4Rm7T6-gSspukZBWd38X/exec";

let watchId=null;
let lastSent=0;

function startTracking(){
if(!navigator.geolocation){
alert("المتصفح لا يدعم GPS");
return;
}

document.getElementById("startBtn").disabled=true;
document.getElementById("status").innerHTML="🟢 جاري التتبع";

const hours=Number(document.getElementById("hours").value);
const endTime=Date.now()+hours*60*60*1000;

setInterval(()=>updateTimer(endTime),1000);

watchId=navigator.geolocation.watchPosition((position)=>{

const lat=position.coords.latitude;
const lng=position.coords.longitude;

const now=Date.now();

if(now-lastSent>30000){
lastSent=now;

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
name:document.getElementById("customerName").value||"زبون",
lat:lat,
lng:lng
})
});
}

document.getElementById("result").innerHTML=`
<a class="mapbtn" target="_blank"
href="https://www.google.com/maps?q=${lat},${lng}">
🗺️ فتح الموقع الحالي
</a>
<p>Latitude: ${lat}</p>
<p>Longitude: ${lng}</p>
`;

},()=>{
alert("يرجى السماح بالموقع");
});
}

function updateTimer(endTime){
const remaining=endTime-Date.now();

if(remaining<=0){
document.getElementById("timer").innerHTML="⛔ انتهت مدة التتبع";
document.getElementById("status").innerHTML="🔴 متوقف";
if(watchId) navigator.geolocation.clearWatch(watchId);
return;
}

const h=Math.floor(remaining/3600000);
const m=Math.floor((remaining%3600000)/60000);
const s=Math.floor((remaining%60000)/1000);

document.getElementById("timer").innerHTML=`⏳ ${h}:${m}:${s}`;
}
</script>

</body>
</html>
